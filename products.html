<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products | Asirbad Creation</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #ffffff;
}

/* NAVBAR */
<div class="navbar">
    <div style="display: flex; align-items: center; gap: 10px;">
        <img src="logo.png" alt="logo" style="height: 35px;">
        <h2 style="margin: 0;">Asirbad Creation</h2>
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
    </div>
</div>
}

.nav-links a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
}

/* TITLE */
.title {
    text-align: center;
    margin: 30px 0 10px;
    font-size: 26px;
    font-weight: 600;
}

/* SEARCH */
.search-box {
    text-align: center;
    margin-bottom: 20px;
}

.search-box input {
    width: 60%;
    padding: 12px;
    border-radius: 25px;
    border: 1px solid #ddd;
    font-size: 15px;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 25px;
    padding: 30px;
}

/* CARD */
.card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #eee;
    transition: 0.25s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.card h3 {
    margin: 0;
    font-size: 16px;
}

/* PRICE */
.price {
    margin: 8px 0;
    font-weight: bold;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 8px 14px;
    background: black;
    color: white;
    border-radius: 20px;
    text-decoration: none;
    font-size: 13px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>Asirbad Creation</h2>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
    </div>
</div>

<!-- TITLE -->
<div class="title">Our Products</div>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search products...">
</div>

<!-- PRODUCTS -->
<div class="products">

    <div class="card">
        <img src="https://i.postimg.cc/VNHvX01b/bill-book.jpg">
        <div class="card-content">
            <h3>Custom Bill Book Printing</h3>
            <div class="price">₹119 onwards</div>
            <a href="https://wa.me/9831102291?text=I want Custom Bill Book Printing" class="btn">Order</a>
        </div>
    </div>

    <div class="card">
        <img src="https://i.postimg.cc/9QgCk3S4/calender.jpg">
        <div class="card-content">
            <h3>Calendar Printing</h3>
            <div class="price">₹139 onwards</div>
            <a href="https://wa.me/9831102291?text=I want Calendar Printing" class="btn">Order</a>
        </div>
    </div>

    <div class="card">
        <img src="https://i.postimg.cc/rmXX6q9F/visiting-card.jpg">
        <div class="card-content">
            <h3>Visiting Card (100 pcs)</h3>
            <div class="price">₹119</div>
            <a href="https://wa.me/9831102291?text=I want Visiting Card" class="btn">Order</a>
        </div>
    </div>

    <div class="card">
        <img src="https://i.postimg.cc/j5scn9xh/Whats-App-Image-2026-04-03-at-9-33-40-PM.jpg">
        <div class="card-content">
            <h3>Self Ink Stamp</h3>
            <div class="price">₹349 - ₹399</div>
            <a href="https://wa.me/9831102291?text=I want Self Ink Stamp" class="btn">Order</a>
        </div>
    </div>

    <div class="card">
        <img src="https://i.postimg.cc/Dy2hyy3f/lanyard.jpg">
        <div class="card-content">
            <h3>ID Card / Lanyard Printing</h3>
            <div class="price">₹25 - ₹250</div>
            <a href="https://wa.me/9831102291?text=I want ID Card / Lanyard" class="btn">Order</a>
        </div>
    </div>

</div>

<!-- SEARCH SCRIPT -->
<script>
const searchInput = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");

searchInput.addEventListener("keyup", function() {
    let filter = searchInput.value.toLowerCase();

    cards.forEach(card => {
        let text = card.innerText.toLowerCase();
        card.style.display = text.includes(filter) ? "block" : "none";
    });
});
</script>

</body>
</html>
