<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products | Asirbad Creation</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eef2f7, #e3e9f0);
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: black;
    color: white;
}

.nav-links a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-weight: 500;
}

/* SEARCH */
.search-box {
    text-align: center;
    margin: 30px;
}

.search-box input {
    width: 60%;
    padding: 14px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* PRODUCTS GRID */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 30px;
    padding: 40px;
}

/* CARD */
.card {
    background: white;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    transition: 0.35s;
    position: relative;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
}

/* BADGE */
.badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: black;
    color: white;
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 20px;
}

/* IMAGE */
.card img {
    width: 100%;
    height: 210px;
    object-fit: cover;
}

/* CONTENT */
.card-content {
    padding: 18px;
}

.card h3 {
    margin: 0;
    font-size: 18px;
}

/* PRICE */
.price {
    color: #0a8f2f;
    font-weight: bold;
    margin: 12px 0;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 10px 16px;
    background: black;
    color: white;
    border-radius: 25px;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.btn:hover {
    background: #333;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>Asirbad Creation</h2>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
    </div>
</div>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search products...">
</div>

<!-- PRODUCTS -->
<div class="products" id="productList">

    <div class="card">
        <div class="badge">Popular</div>
        <img src="https://i.postimg.cc/VNHvX01b/bill-book.jpg">
        <div class="card-content">
            <h3>Custom Bill Book Printing</h3>
            <div class="price">₹119 onwards</div>
            <a href="https://wa.me/91YOURNUMBER?text=I want Custom Bill Book Printing" class="btn">Order Now</a>
        </div>
    </div>

    <div class="card">
        <img src="https://i.postimg.cc/9QgCk3S4/calender.jpg">
        <div class="card-content">
            <h3>Calendar Printing</h3>
            <div class="price">₹139 onwards</div>
            <a href="https://wa.me/91YOURNUMBER?text=I want Calendar Printing" class="btn">Order Now</a>
        </div>
    </div>

    <div class="card">
        <div class="badge">Best Seller</div>
        <img src="https://i.postimg.cc/rmXX6q9F/visiting-card.jpg">
        <div class="card-content">
            <h3>Visiting Card (100 pcs)</h3>
            <div class="price">₹119</div>
            <a href="https://wa.me/91YOURNUMBER?text=I want Visiting Card (100 pcs)" class="btn">Order Now</a>
        </div>
    </div>

    <div class="card">
        <img src="https://i.postimg.cc/j5scn9xh/Whats-App-Image-2026-04-03-at-9-33-40-PM.jpg">
        <div class="card-content">
            <h3>Self Ink Stamp</h3>
            <div class="price">₹349 - ₹399</div>
            <a href="https://wa.me/919831102291?text=I want Self Ink Stamp" class="btn">Order Now</a>
        </div>
    </div>

    <div class="card">
        <img src="https://i.postimg.cc/Dy2hyy3f/lanyard.jpg">
        <div class="card-content">
            <h3>ID Card / Lanyard Printing</h3>
            <div class="price"> ₹25-₹250 </div>
            <a href="https://wa.me/91YOURNUMBER?text=I want ID Card / Lanyard Printing" class="btn">Order Now</a>
        </div>
    </div>

</div>

<!-- SEARCH SCRIPT -->
<script>
const searchInput = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");

searchInput.addEventListener("keyup", function() {
    let filter = searchInput.value.toLowerCase();

    cards.forEach(card => {
        let text = card.innerText.toLowerCase();
        card.style.display = text.includes(filter) ? "block" : "none";
    });
});
</script>

</body>
</html>
