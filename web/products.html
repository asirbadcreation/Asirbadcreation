<!DOCTYPE html>
<html>
<head>
  <title>Our Products - Asirbad Creation</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 30px;
    }

    .product-card {
      background: white;
      width: 260px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .product-card:hover {
      transform: translateY(-5px);
    }

    .product-card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      font-weight: bold;
      margin: 10px 0;
    }

    .btn {
      padding: 10px 15px;
      background: green;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      display: inline-block;
    }
  </style>
</head>

<body>

<header>
  <h1>Our Products</h1>
  <p>Asirbad Creation</p>
</header>

<div class="products">

  <div class="product-card">
    <img src="https://via.placeholder.com/250">
    <h3>Visiting Cards</h3>
    <p class="price">₹120 / 100 cards</p>
    <a class="btn" href="https://wa.me/919831102291?text=I want Visiting Cards">
      Order on WhatsApp
    </a>
  </div>



  <div class="product-card">
    <img src="https://via.placeholder.com/250">
    <h3>ID Card + Lanyard </h3>
    <p class="price">₹20 per piece</p>
    <a class="btn" href="https://wa.me/919831102291?text=I want ID Card">
      Order on WhatsApp
    </a>
  </div>

</div>

</body>
</html>
