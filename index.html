<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Asirbad Creation</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* FULL BACKGROUND IMAGE */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* CLICKABLE AREAS */
    .btn {
      position: absolute;
      display: block;
      cursor: pointer;
    }

    /* NAV LINKS */
    .home {
      top: 3%;
      right: 22%;
      width: 6%;
      height: 5%;
    }

    .products {
      top: 3%;
      right: 14%;
      width: 8%;
      height: 5%;
    }

    .contact {
      top: 3%;
      right: 5%;
      width: 9%;
      height: 5%;
    }

    /* EXPLORE BUTTON */
    .explore {
      top: 48%;
      left: 8%;
      width: 15%;
      height: 8%;
    }

    /* OPTIONAL HOVER EFFECT */
    .btn:hover {
      background: rgba(0, 0, 0, 0.08);
      border-radius: 8px;
    }

    /* MOBILE FIX */
    @media(max-width: 768px) {
      .explore {
        top: 55%;
        left: 10%;
        width: 35%;
        height: 10%;
      }
    }
  </style>
</head>

<body>

<div class="hero">

  <!-- YOUR BACKGROUND IMAGE -->
  <img src="background.jpg.png" alt="Asirbad Creation Banner">

  <!-- CLICKABLE AREAS -->
  <a href="index.html" class="btn home"></a>
  <a href="products.html" class="btn products"></a>
  <a href="#contact" class="btn contact"></a>
  <a href="products.html" class="btn explore"></a>

</div>

</body>
</html>
