<!DOCTYPE html>
<html>
<head>
  <title>Asirbad Creation</title>

  <style>
    body {
      margin: 0;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
    }

    /* FULL IMAGE */
    .hero {
      position: relative;
      width: 100%;
    }

    .hero img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* CLICKABLE AREAS */
    .btn {
      position: absolute;
      display: block;
    }

    /* NAV LINKS (top right) */
    .home {
      top: 40px;
      right: 260px;
      width: 80px;
      height: 40px;
    }

    .products {
      top: 40px;
      right: 160px;
      width: 100px;
      height: 40px;
    }

    .contact {
      top: 40px;
      right: 50px;
      width: 100px;
      height: 40px;
    }

    /* EXPLORE BUTTON */
    .explore {
      top: 300px;
      left: 120px;
      width: 200px;
      height: 60px;
    }

    /* MAKE THEM INVISIBLE BUT CLICKABLE */
    .btn:hover {
      background: rgba(0,0,0,0.1); /* optional hover */
    }
  </style>
</head>

<body>

<div class="hero">
  <!-- YOUR IMAGE -->
  <img src="background.jpg.png">

  <!-- CLICKABLE LINKS -->
  <a href="index.html" class="btn home"></a>
  <a href="products.html" class="btn products"></a>
  <a href="#contact" class="btn contact"></a>
  <a href="products.html" class="btn explore"></a>
</div>

</body>
</html>
