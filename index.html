<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asirbad Creation</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            color: white;
        }

        /* HERO BACKGROUND */
        .hero {
            height: 100vh;
            width: 100%;
            background: url('background.png') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
        }

        /* DARK OVERLAY */
        .overlay {
            background: rgba(0,0,0,0.55);
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .nav-links a {
            color: white;
            margin-left: 25px;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #ffd700;
        }

        /* CONTENT */
        .content {
            text-align: center;
            margin-top: auto;
            margin-bottom: 120px;
            padding: 0 20px;
        }

        .content h1 {
            font-size: 52px;
            letter-spacing: 3px;
        }

        .content p {
            margin-top: 15px;
            font-size: 18px;
            opacity: 0.9;
        }

        /* BUTTONS */
        .buttons {
            margin-top: 35px;
        }

        .btn {
            padding: 14px 28px;
            margin: 10px;
            border: none;
            background: #ffd700;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 6px;
            font-size: 15px;
        }

        .btn:hover {
            background: white;
            transform: scale(1.05);
        }

        /* SCROLL SECTION */
        .products-preview {
            height: 100vh;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            letter-spacing: 2px;
        }

        /* MOBILE RESPONSIVE */
        @media(max-width: 768px) {
            .content h1 {
                font-size: 36px;
            }

            .navbar {
                padding: 15px 20px;
            }

            .nav-links a {
                margin-left: 15px;
                font-size: 14px;
            }
        }

    </style>
</head>

<body>

    <div class="hero">
        <div class="overlay">

            <!-- NAVBAR -->
            <div class="navbar">
                <div class="logo">Asirbad Creation</div>
                <div class="nav-links">
                    <a href="#">Home</a>
                    <a href="products.html">Products</a>
                    <a href="https://wa.me/919831102291" target="_blank">Contact</a>
                </div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="content">
                <h1>Print Your Mark</h1>
                <p>Premium Custom Printing Solutions</p>

                <div class="buttons">
                    <button class="btn" onclick="location.href='products.html'">
                        Explore Products
                    </button>

                    <button class="btn" onclick="window.open('https://wa.me/919831102291')">
                        Order on WhatsApp
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- NEXT SECTION -->
    <div class="products-preview">
        Coming Soon: Our Products
    </div>

</body>
</html>
