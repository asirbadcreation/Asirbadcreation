<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asirbad Creation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {font-family:'Poppins',sans-serif;overflow-x:hidden;}

/* HERO */
.hero {
  position: relative;
  width: 100%;
}

.hero img {
  width: 100%;
  display: block;
}

/* NAV */
.nav {
  position: absolute;
  top: 5%;
  right: 6%;
  display: flex;
  gap: 28px;
  z-index: 2;
}

.nav a {
  text-decoration: none;
  color: #1a1a1a;
  font-weight: 500;
}

/* HERO BOX */
.hero-content {
  position: absolute;
  top: 47%;
  left: 6%;
  transform: translateY(-50%);
  width: 30%;
  min-width: 260px;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(14px);
  padding: 28px;
  border-radius: 18px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}

/* BUTTON */
.btn {
  display: inline-block;
  padding: 11px 20px;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  margin-top: 10px;
}

/* 🔥 INSIDE CONTENT (MAIN MAGIC) */
.inside-content {
  position: absolute;
  top: 70%; /* adjust this if needed */
  width: 100%;
  text-align: center;
  padding: 0 20px;
}

/* SERVICES */
.services {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 30px;
}

.card {
  background: rgba(255,255,255,0.9);
  padding: 15px;
  border-radius: 12px;
  width: 160px;
  font-size: 14px;
}

/* PRODUCTS */
.products {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.product {
  background: rgba(255,255,255,0.95);
  padding: 15px;
  border-radius: 12px;
  width: 180px;
}

/* CONTACT */
.contact {
  margin-top: 20px;
  font-weight: 600;
}

/* MOBILE */
@media(max-width:768px){
  .hero-content,
  .inside-content {
    position: static;
    transform: none;
    width: 90%;
    margin: 20px auto;
  }
}
</style>
</head>

<body>

<div class="hero">

<img src="template.png">

<!-- NAV -->
<div class="nav">
  <a href="#">Home</a>
  <a href="products.html">Products</a>
  <a href="https://wa.me/919831102291">Contact</a>
</div>

<!-- HERO BOX -->
<div class="hero-content">
  <h1>Professional Printing Services</h1>
  <p>We provide high-quality printing, ID cards, visiting cards, and branding solutions.</p>

  <a href="products.html" class="btn">Explore Products</a>
  <a href="https://wa.me/919831102291" class="btn">Order Now</a>
</div>

<!-- 🔥 MOVED INSIDE BACKGROUND -->
<div class="inside-content">

  <!-- SERVICES -->
  <div class="services">
    <div class="card">🪪 ID Cards</div>
    <div class="card">📄 Printing</div>
    <div class="card">🏷️ Lanyards</div>
    <div class="card">🎁 Custom Gifts</div>
  </div>

  <!-- PRODUCTS -->
  <div class="products">
    <div class="product">
      <h3>Lanyard + ID Card</h3>
      <p>₹20 / piece</p>
    </div>

    <div class="product">
      <h3>Visiting Card</h3>
      <p>₹2 / piece</p>
    </div>
  </div>

  <!-- CONTACT -->
  <div class="contact">📞 9831102291</div>

</div>

</div>

</body>
</html>
