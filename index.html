<!DOCTYPE html>
<html>
<head>
  <title>Asirbad Creation</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow-x: hidden;

      background: url("background.jpg.png") no-repeat center;
      background-size: cover;
    }

    /* LIGHT OVERLAY */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(
        rgba(255,255,255,0.65),
        rgba(255,255,255,0.75)
      );
      z-index: -1;
    }

    header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 15px;
    }

    header img {
      width: 45px;
      border-radius: 50%;
    }

    header h1 {
      display: none; /* 🔥 REMOVE TEXT (already in background) */
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 180px 20px 120px;
    }

    /* TAGLINE INSTEAD */
    .tagline {
      font-size: 22px;
      color: #222;
      text-shadow: 0 6px 20px rgba(0,0,0,0.3);
      background: rgba(255,255,255,0.5);
      display: inline-block;
      padding: 12px 25px;
      border-radius: 8px;
      backdrop-filter: blur(6px);
    }

    .hero a {
      display: inline-block;
      margin-top: 30px;
      padding: 16px 35px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }

    .hero a:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }

    .trust {
      text-align: center;
      padding: 14px;
      background: rgba(0,0,0,0.9);
      color: white;
    }

    .services {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      padding: 70px 20px;
    }

    .service {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 16px;
      width: 190px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      transition: 0.4s;
    }

    .service:hover {
      transform: translateY(-10px);
    }

    .title {
      text-align: center;
      font-size: 30px;
      margin-top: 20px;
      text-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .products {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      padding: 50px;
    }

    .product {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 30px;
      width: 250px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      transition: 0.4s;
    }

    .product:hover {
      transform: translateY(-12px);
    }

    .price {
      font-weight: bold;
    }

    .min {
      color: red;
      font-size: 14px;
    }

    .product a {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 18px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    footer {
      text-align: center;
      padding: 30px;
      background: rgba(255,255,255,0.85);
    }
  </style>
</head>

<body>

<header>
  <img src="logo.jpg">
</header>

<section class="hero">
  <div class="tagline">
    Print. Brand. Deliver.
  </div>
  <br>
  <a href="products.html">Explore Products</a>
</section>

<div class="trust">
  ✔ BULK ORDERS | ✔ FAST DELIVERY | ✔ BEST PRICE GUARANTEE
</div>

<section class="services">
  <div class="service">🪪 ID Cards</div>
  <div class="service">📄 Printing</div>
  <div class="service">🏷️ Lanyards</div>
  <div class="service">🎁 Custom Gifts</div>
</section>

<h2 class="title">Popular Products</h2>

<div class="products">

  <div class="product">
    <h3>Lanyard + ID Card</h3>
    <p class="price">₹20 / piece</p>
    <p class="min">Min: 5 pcs</p>
    <a href="https://wa.me/919831102291?text=I want Lanyard + ID Card">
      Order on WhatsApp
    </a>
  </div>

</div>

<footer>
  <p>📞 9831102291</p>
  <p>© 2026 Asirbad Creation</p>
</footer>

</body>
</html>
