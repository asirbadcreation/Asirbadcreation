<!DOCTYPE html>
<html>
<head>
  <title>Asirbad Creation</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      color: black;
    }

    header {
      padding: 20px;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    header img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
    }

    header h1 {
      font-size: 28px;
      margin: 0;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h2 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #555;
    }

    .hero a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      border: 1px solid black;
      text-decoration: none;
      color: black;
      border-radius: 5px;
    }

    .title {
      text-align: center;
      margin-top: 50px;
      font-size: 28px;
    }

    .products {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 30px;
      flex-wrap: wrap;
    }

    .product {
      border: 1px solid #ddd;
      padding: 20px;
      width: 220px;
      text-align: center;
      border-radius: 10px;
      transition: 0.3s;
    }

    .product:hover {
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .price {
      font-weight: bold;
      margin: 10px 0;
    }

    .min {
      color: red;
      font-size: 14px;
    }

    .product a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px;
      border: 1px solid black;
      text-decoration: none;
      color: black;
      border-radius: 5px;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #ddd;
      margin-top: 50px;
      color: #555;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<header>
  <img src="logo.jpg" alt="Logo">
  <h1>Asirbad Creation</h1>
</header>

<!-- HERO -->
<section class="hero">
  <h2>Simple & Reliable Printing Services</h2>
  <p>Order directly on WhatsApp with best pricing</p>
  <a href="products.html">Buy From Us</a>
</section>

<!-- PRODUCTS -->
<h2 class="title">Popular Products</h2>

<div class="products">

  <div class="product">
    <h3>Lanyard + ID Card</h3>
    <p class="price">₹20 / piece</p>
    <p class="min">Min: 5 pcs</p>
    <a href="https://wa.me/919831102291?text=I want to order Lanyard + ID Card (min 5 pcs)">
      Order
    </a>
  </div>

  <div class="product">
    <h3>Visiting Card</h3>
    <p class="price">₹2 / piece</p>
    <p class="min">Min: 100 pcs</p>
    <a href="https://wa.me/919831102291?text=I want Visiting Cards">
      Order
    </a>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <p>📞 9831102291</p>
  <p>© 2026 Asirbad Creation</p>
</footer>

</body>
</html>
