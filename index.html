<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asirbad Creation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {font-family:'Poppins',sans-serif;overflow-x:hidden;}

/* HERO */
.hero {position:relative;width:100%;}
.hero img {width:100%;display:block;}

/* NAV */
.nav {
  position:absolute;
  top:5%;
  right:6%;
  display:flex;
  gap:28px;
}
.nav a {
  text-decoration:none;
  color:#1a1a1a;
  font-weight:500;
}

/* HERO CONTENT */
.hero-content {
  position:absolute;
  top:47%;
  left:6%;
  transform:translateY(-50%);
  width:30%;
  min-width:260px;
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(14px);
  padding:28px;
  border-radius:18px;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
}

.btn {
  display:inline-block;
  padding:10px 18px;
  background:black;
  color:white;
  text-decoration:none;
  border-radius:8px;
  margin-top:10px;
}

/* DYNAMIC SECTION */
.dynamic-section {
  padding:80px 20px;
  background:#f6f6f6;
  text-align:center;
}

.dynamic-section h2 {
  font-size:28px;
}

/* SEARCH */
.search-box {
  margin:20px auto;
  max-width:400px;
}
.search-box input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* PRODUCTS */
.products {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:25px;
  margin-top:30px;
}

.product {
  background:white;
  padding:20px;
  border-radius:16px;
  width:220px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  transition:0.3s;
}

.product:hover {
  transform:translateY(-5px);
}

.product img {
  width:100%;
  border-radius:10px;
  margin-bottom:10px;
}

.product a {
  display:inline-block;
  margin-top:10px;
  background:#25D366;
  color:white;
  padding:8px 12px;
  border-radius:6px;
  text-decoration:none;
}

/* FOOTER */
footer {
  text-align:center;
  padding:30px;
}

/* MOBILE */
@media(max-width:768px){
  .hero-content {
    position:static;
    transform:none;
    width:90%;
    margin:20px auto;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

<img src="template.png">

<div class="nav">
  <a href="#">Home</a>
  <a href="products.html">Products</a>
  <a href="https://wa.me/919831102291">Contact</a>
</div>

<div class="hero-content">
  <h1>Professional Printing Services</h1>
  <p>High-quality printing, ID cards, visiting cards & branding solutions.</p>
  <a href="products.html" class="btn">Explore Products</a>
  <a href="https://wa.me/919831102291" class="btn">Order Now</a>
</div>

</div>

<!-- DYNAMIC PRODUCTS -->
<div class="dynamic-section">

<h2>Popular Products</h2>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search products...">
</div>

<div class="products" id="productList"></div>

</div>

<!-- FOOTER -->
<footer>
  <p>📞 9831102291</p>
</footer>

<script>

// ✅ YOUR GOOGLE SHEET
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRC9cjYmdReNVxNGaOuHUXNz9qeOIOT1iaCflqKbglAmYFCcpyTSMo6cP6LiI3DtUv8Q6clOzpSfwkQ/pub?output=csv";

fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").slice(1);
    const container = document.getElementById("productList");

    rows.forEach(row => {
      const cols = row.split(",");

      const name = cols[0];
      const price = cols[1];
      const image = cols[2];
      const msg = cols[3];

      if(!name) return;

      const div = document.createElement("div");
      div.classList.add("product");

      div.innerHTML = `
        <img src="${image}">
        <h3>${name}</h3>
        <p>${price}</p>
        <a href="https://wa.me/919831102291?text=${encodeURIComponent(msg)}" target="_blank">
          Order on WhatsApp
        </a>
      `;

      container.appendChild(div);
    });
  });

// SEARCH
document.getElementById("searchInput").addEventListener("keyup", function() {
  const value = this.value.toLowerCase();
  const items = document.querySelectorAll(".product");

  items.forEach(item => {
    item.style.display = item.innerText.toLowerCase().includes(value)
      ? "block"
      : "none";
  });
});

</script>

</body>
</html>
